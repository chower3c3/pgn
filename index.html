<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Pittsburgh Golf Network | The Links Between Pittsburgh's Best Professionals</title>
  <meta name="description" content="An application-only golf and business networking membership for Pittsburgh entrepreneurs, executives, and investors."/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>

<body>
  <div id="root" style="opacity:0;transition:opacity 0.3s"></div>
  <script type="text/babel" data-presets="react">
const { useState, useEffect, useRef } = React;

/* ── CSS ── */
const CSS = `
  :root {
    --gold:#C9A84C;--gold-light:#E2C06A;--gold-dim:#9A7A32;--gold-pale:#FAF3E0;
    --green:#0E2B1A;--green-mid:#1A4A2A;--green-accent:#2A6640;--green-pale:#EBF2EC;
    --off-white:#F8F7F4;--cream:#F3EFE6;--white:#FFFFFF;
    --text:#141414;--text-mid:#444;--text-light:#888;
    --border:rgba(0,0,0,0.08);
    --shadow-sm:0 2px 16px rgba(0,0,0,0.07);
    --shadow-md:0 8px 40px rgba(0,0,0,0.11);
    --shadow-lg:0 20px 80px rgba(0,0,0,0.15);
    --radius:8px;--radius-sm:4px;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  html{scroll-behavior:smooth;}
  body{font-family:'Montserrat',sans-serif;background:var(--off-white);color:var(--text);overflow-x:hidden;-webkit-font-smoothing:antialiased;}
  a{text-decoration:none;color:inherit;}
  img{display:block;}
  button{font-family:inherit;cursor:pointer;}
  ::-webkit-scrollbar{width:6px;}
  ::-webkit-scrollbar-track{background:var(--off-white);}
  ::-webkit-scrollbar-thumb{background:var(--gold-dim);border-radius:3px;}

  .nav{position:fixed;top:0;left:0;right:0;z-index:900;height:64px;display:flex;align-items:center;justify-content:space-between;padding:0 48px;background:rgba(255,255,255,0.92);backdrop-filter:blur(20px) saturate(180%);-webkit-backdrop-filter:blur(20px) saturate(180%);border-bottom:1px solid rgba(201,168,76,0.15);transition:box-shadow 0.3s;}
  .nav.scrolled{box-shadow:0 1px 24px rgba(0,0,0,0.08);}
  .nav-logo{display:flex;align-items:center;gap:11px;}
  .nav-logo-svg{width:38px;height:38px;flex-shrink:0;}
  .nav-logo-text{display:flex;flex-direction:column;gap:1px;}
  .nav-logo-primary{font-size:13px;font-weight:800;letter-spacing:0.06em;text-transform:uppercase;color:var(--green);}
  .nav-logo-sub{font-size:7.5px;font-weight:600;letter-spacing:0.18em;text-transform:uppercase;color:var(--gold-dim);}
  .nav-links{display:flex;align-items:center;gap:28px;list-style:none;}
  .nav-links a{font-size:10.5px;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;color:var(--text-mid);transition:color 0.2s;}
  .nav-links a:hover{color:var(--gold-dim);}
  .nav-actions{display:flex;align-items:center;gap:10px;}
  .btn-ghost{font-size:10.5px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;padding:8px 16px;border:1.5px solid rgba(14,43,26,0.3);border-radius:var(--radius-sm);color:var(--green);transition:all 0.2s;display:inline-block;}
  .btn-ghost:hover{border-color:var(--green);background:var(--green);color:white;}
  .btn-gold{font-size:10.5px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;padding:9px 20px;background:var(--gold);border-radius:var(--radius-sm);color:white;border:none;transition:all 0.22s;display:inline-block;}
  .btn-gold:hover{background:var(--gold-light);transform:translateY(-1px);box-shadow:0 6px 20px rgba(201,168,76,0.35);}
  .nav-hamburger{display:none;flex-direction:column;gap:5px;background:none;border:none;padding:6px;z-index:1001;}
  .nav-hamburger span{display:block;width:22px;height:2px;background:var(--text);border-radius:1px;transition:all 0.28s;transform-origin:center;}
  .nav-hamburger.open span:nth-child(1){transform:translateY(7px) rotate(45deg);}
  .nav-hamburger.open span:nth-child(2){opacity:0;transform:scaleX(0);}
  .nav-hamburger.open span:nth-child(3){transform:translateY(-7px) rotate(-45deg);}
  .mobile-menu{position:fixed;top:64px;left:0;right:0;z-index:800;background:rgba(255,255,255,0.97);backdrop-filter:blur(20px);border-bottom:1px solid rgba(201,168,76,0.15);padding:24px 28px 32px;display:flex;flex-direction:column;gap:6px;transform:translateY(-110%);transition:transform 0.32s cubic-bezier(0.4,0,0.2,1);box-shadow:0 8px 32px rgba(0,0,0,0.1);}
  .mobile-menu.open{transform:translateY(0);}
  .mobile-menu a{font-size:13px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:var(--text-mid);padding:12px 0;border-bottom:1px solid var(--border);display:block;transition:color 0.2s;}
  .mobile-menu a:hover{color:var(--green);}
  .mobile-menu-ctas{display:flex;gap:10px;margin-top:16px;flex-wrap:wrap;}
  .mobile-menu-ctas a{flex:1;text-align:center;}

  .hero{min-height:100vh;padding-top:64px;position:relative;display:flex;align-items:center;overflow:hidden;background:var(--green);}
  .hero-mesh{position:absolute;inset:0;z-index:0;background:radial-gradient(ellipse 100% 80% at 80% 50%,rgba(42,102,64,0.55) 0%,transparent 65%),radial-gradient(ellipse 60% 60% at 5% 80%,rgba(201,168,76,0.08) 0%,transparent 55%),linear-gradient(170deg,#061610 0%,#0E2B1A 50%,#122A1C 100%);}
  .hero-grid{position:absolute;inset:0;z-index:1;background-image:linear-gradient(rgba(255,255,255,0.018) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.018) 1px,transparent 1px);background-size:72px 72px;}
  .hero-inner{position:relative;z-index:2;max-width:1200px;margin:0 auto;padding:100px 60px 80px;width:100%;}
  .hero-eyebrow{display:inline-flex;align-items:center;gap:12px;font-size:10px;font-weight:700;letter-spacing:0.26em;text-transform:uppercase;color:var(--gold);margin-bottom:28px;}
  .hero-eyebrow::before,.hero-eyebrow::after{content:'';display:block;width:32px;height:1px;background:var(--gold);opacity:0.5;}
  .hero-headline{font-size:clamp(32px,6vw,80px);font-weight:900;line-height:1.05;color:white;margin-bottom:20px;letter-spacing:-0.02em;text-transform:uppercase;max-width:780px;word-break:break-word;}
  .hero-headline em{font-style:italic;color:var(--gold-light);}
  .hero-tagline{font-family:'Libre Baskerville',serif;font-style:italic;font-size:18px;color:rgba(255,255,255,0.55);margin-bottom:24px;}
  .hero-sub{font-size:15px;line-height:1.9;font-weight:300;color:rgba(255,255,255,0.58);max-width:540px;margin-bottom:48px;}
  .hero-ctas{display:flex;gap:16px;align-items:center;flex-wrap:wrap;}
  .btn-hero-p{font-size:12px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;padding:17px 40px;background:var(--gold);color:white;border-radius:var(--radius-sm);transition:all 0.25s;border:none;display:inline-block;}
  .btn-hero-p:hover{background:var(--gold-light);transform:translateY(-2px);box-shadow:0 10px 32px rgba(201,168,76,0.4);}
  .btn-hero-s{font-size:12px;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;color:rgba(255,255,255,0.7);padding:17px 0;border-bottom:1px solid rgba(255,255,255,0.25);transition:all 0.2s;display:inline-block;}
  .btn-hero-s:hover{color:white;border-color:white;}

  section{scroll-margin-top:64px;}
  .sw{max-width:1160px;margin:0 auto;padding:0 48px;}
  .sh{text-align:center;max-width:640px;margin:0 auto 56px;}
  .eyebrow{display:inline-flex;align-items:center;gap:10px;font-size:9.5px;font-weight:700;letter-spacing:0.24em;text-transform:uppercase;color:var(--gold-dim);margin-bottom:14px;}
  .eyebrow::before,.eyebrow::after{content:'';width:20px;height:1px;background:var(--gold-dim);opacity:0.6;}
  .st{font-size:clamp(26px,3.5vw,40px);font-weight:800;color:var(--green);line-height:1.1;margin-bottom:14px;letter-spacing:-0.02em;text-transform:uppercase;}
  .ss{font-size:14.5px;line-height:1.85;color:var(--text-mid);font-weight:300;}
  .st-l{color:white;}.ss-l{color:rgba(255,255,255,0.55);}
  .reveal{opacity:0;transform:translateY(28px);transition:opacity 0.7s ease,transform 0.7s ease;}
  .reveal.in{opacity:1;transform:translateY(0);}

  .value-s{background:var(--white);padding:100px 0;}
  .vg{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:rgba(201,168,76,0.1);border:1px solid rgba(201,168,76,0.15);border-radius:var(--radius);overflow:hidden;}
  .vc{background:var(--white);padding:48px 36px 44px;transition:background 0.25s;}
  .vc:hover{background:var(--gold-pale);}
  .vi{width:44px;height:44px;background:linear-gradient(135deg,var(--green) 0%,var(--green-accent) 100%);border-radius:6px;display:flex;align-items:center;justify-content:center;margin-bottom:22px;}
  .vi svg{width:20px;height:20px;fill:var(--gold-light);}
  .vc h3{font-size:13px;font-weight:700;color:var(--green);margin-bottom:13px;text-transform:uppercase;letter-spacing:0.05em;}
  .vc p{font-size:13.5px;line-height:1.85;color:var(--text-mid);font-weight:300;}

  .pricing-s{background:var(--off-white);padding:100px 0;}
  .mb{max-width:880px;margin:0 auto 28px;background:linear-gradient(135deg,var(--green) 0%,#1C3D2A 100%);border-radius:var(--radius);padding:36px 44px;border:1px solid rgba(201,168,76,0.2);position:relative;overflow:hidden;}
  .mb::before{content:'';position:absolute;top:-60px;right:-60px;width:240px;height:240px;border-radius:50%;background:radial-gradient(circle,rgba(201,168,76,0.07) 0%,transparent 70%);pointer-events:none;}
  .mb-lbl{font-size:9px;font-weight:700;letter-spacing:0.22em;text-transform:uppercase;color:var(--gold);margin-bottom:22px;}
  .mb-g{display:grid;grid-template-columns:1fr 1fr;gap:14px 48px;}
  .mb-i{display:flex;align-items:flex-start;gap:11px;font-size:13px;color:rgba(255,255,255,0.78);font-weight:400;line-height:1.45;}
  .mb-i svg{width:16px;height:16px;fill:var(--gold-light);flex-shrink:0;margin-top:2px;}
  .promo-bar{max-width:880px;margin:0 auto 44px;display:flex;align-items:center;justify-content:space-between;gap:20px;background:white;border:1px solid rgba(201,168,76,0.3);border-radius:var(--radius);padding:18px 28px;box-shadow:var(--shadow-sm);flex-wrap:wrap;}
  .promo-bar strong{display:block;font-size:14px;font-weight:700;color:var(--green);margin-bottom:3px;}
  .promo-bar span{font-size:12.5px;color:var(--text-mid);font-weight:300;}
  .promo-pill{font-size:9.5px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;background:var(--gold);color:white;padding:7px 16px;border-radius:20px;white-space:nowrap;flex-shrink:0;}
  .pg{max-width:880px;margin:0 auto 36px;display:grid;grid-template-columns:repeat(3,1fr);gap:20px;align-items:start;}
  .pc{background:white;border:1.5px solid var(--border);border-radius:var(--radius);overflow:hidden;transition:all 0.3s;}
  .pc:hover{transform:translateY(-4px);box-shadow:var(--shadow-md);}
  .pc.top{border-color:var(--gold);box-shadow:0 0 0 1px var(--gold),var(--shadow-md);transform:scale(1.022);}
  .pc.top:hover{transform:scale(1.022) translateY(-4px);}
  .pc-pop{background:var(--gold);color:white;font-size:9px;font-weight:700;letter-spacing:0.18em;text-transform:uppercase;text-align:center;padding:7px;}
  .pc-h{padding:26px 26px 22px;background:linear-gradient(160deg,var(--green) 0%,#1C4030 100%);}
  .pc.top .pc-h{background:linear-gradient(160deg,#081A10 0%,var(--green-mid) 100%);}
  .pc-tier{font-size:9.5px;font-weight:700;letter-spacing:0.18em;text-transform:uppercase;color:var(--gold);margin-bottom:10px;}
  .pc-amt-row{display:flex;align-items:baseline;gap:2px;margin-bottom:5px;}
  .pc-cur{font-size:18px;font-weight:600;color:white;}
  .pc-amt{font-size:44px;font-weight:900;color:white;line-height:1;letter-spacing:-0.03em;}
  .pc-per{font-size:12px;color:rgba(255,255,255,0.45);margin-left:3px;}
  .pc-was{font-size:11px;color:rgba(255,255,255,0.35);text-decoration:line-through;margin-bottom:4px;}
  .pc-save{font-size:10.5px;color:var(--gold-light);font-weight:600;}
  .pc-b{padding:24px 26px;background:white;}
  .pc-desc{font-size:13px;color:var(--text-mid);line-height:1.75;margin-bottom:18px;padding-bottom:18px;border-bottom:1px solid var(--border);font-weight:300;}
  .pc-feats{list-style:none;display:flex;flex-direction:column;gap:10px;margin-bottom:24px;}
  .pc-feats li{display:flex;align-items:flex-start;gap:9px;font-size:12.5px;line-height:1.45;color:var(--text);}
  .pc-feats li svg{width:13px;height:13px;fill:var(--green-accent);flex-shrink:0;margin-top:2px;}
  .btn-pc{display:block;text-align:center;padding:12px 18px;font-size:10.5px;font-weight:700;letter-spacing:0.13em;text-transform:uppercase;border-radius:var(--radius-sm);transition:all 0.2s;border:1.5px solid var(--green);color:var(--green);background:transparent;}
  .btn-pc:hover{background:var(--green);color:white;}
  .btn-pc.gld{background:var(--gold);color:white;border-color:var(--gold);}
  .btn-pc.gld:hover{background:var(--gold-light);border-color:var(--gold-light);}
  .ref-strip{max-width:880px;margin:0 auto;background:var(--green-pale);border:1px solid rgba(42,102,64,0.15);border-radius:var(--radius);padding:20px 28px;display:flex;align-items:flex-start;gap:14px;}
  .ref-strip svg{width:24px;height:24px;fill:var(--green-accent);flex-shrink:0;margin-top:2px;}
  .ref-strip strong{display:block;font-size:13px;font-weight:700;color:var(--green);margin-bottom:4px;}
  .ref-strip p{font-size:12.5px;color:var(--text-mid);line-height:1.65;font-weight:300;}

  .roi-s{padding:100px 0;background:linear-gradient(170deg,var(--green) 0%,#122A1C 100%);position:relative;overflow:hidden;}
  .roi-s::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 80% 60% at 85% 20%,rgba(201,168,76,0.05) 0%,transparent 60%);pointer-events:none;}
  .roi-g{display:grid;grid-template-columns:1fr 1fr;gap:80px;align-items:start;}
  .roi-survey{background:rgba(255,255,255,0.06);border:1px solid rgba(201,168,76,0.2);border-radius:var(--radius);padding:28px 30px;margin-bottom:24px;backdrop-filter:blur(6px);}
  .roi-survey h4{font-size:11px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:var(--gold);margin-bottom:14px;}
  .roi-survey p{font-size:13.5px;line-height:1.8;color:rgba(255,255,255,0.72);font-weight:300;}
  .roi-steps{display:flex;flex-direction:column;gap:12px;}
  .roi-step{display:flex;align-items:flex-start;gap:14px;}
  .roi-num{width:28px;height:28px;border-radius:50%;background:var(--gold);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:white;flex-shrink:0;margin-top:1px;}
  .roi-step strong{display:block;font-size:12.5px;font-weight:700;color:white;margin-bottom:3px;}
  .roi-step span{font-size:12px;color:rgba(255,255,255,0.55);line-height:1.6;font-weight:300;}
  .roi-cards{display:flex;flex-direction:column;gap:16px;}
  .roi-card{background:rgba(255,255,255,0.07);border:1px solid rgba(201,168,76,0.18);border-radius:var(--radius);padding:28px 30px;backdrop-filter:blur(6px);transition:background 0.25s;}
  .roi-card:hover{background:rgba(255,255,255,0.1);}
  .roi-card-ico{width:38px;height:38px;background:rgba(201,168,76,0.15);border-radius:5px;display:flex;align-items:center;justify-content:center;margin-bottom:14px;}
  .roi-card-ico svg{width:18px;height:18px;fill:var(--gold-light);}
  .roi-card h3{font-size:12px;font-weight:700;color:white;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:10px;}
  .roi-card p{font-size:13px;line-height:1.75;color:rgba(255,255,255,0.6);font-weight:300;}
  .roi-card.hl{border-color:var(--gold);background:rgba(201,168,76,0.08);}
  .roi-card.hl h3{color:var(--gold-light);}

  .courses-s{background:var(--white);padding:100px 0;}
  .car-outer{overflow:hidden;}
  .car-track{display:flex;gap:20px;transition:transform 0.5s cubic-bezier(0.25,0.46,0.45,0.94);}
  .cc{min-width:calc(33.333% - 14px);flex-shrink:0;background:white;border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow-sm);transition:transform 0.3s,box-shadow 0.3s;}
  .cc:hover{transform:translateY(-4px);box-shadow:var(--shadow-md);}
  .cc-img{height:195px;position:relative;overflow:hidden;background:var(--green-mid);}
  .cc-img img{width:100%;height:100%;object-fit:cover;transition:transform 0.55s ease;display:block;}
  .cc:hover .cc-img img{transform:scale(1.06);}
  .cc-scrim{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(14,43,26,0.05) 0%,rgba(14,43,26,0.6) 100%);}
  .cc-chip{position:absolute;bottom:12px;left:13px;font-size:8.5px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:var(--gold-light);background:rgba(6,22,16,0.72);padding:4px 10px;border-radius:2px;backdrop-filter:blur(6px);}
  .cc-body{padding:17px 19px 19px;}
  .cc-name{font-size:15px;font-weight:700;color:var(--green);margin-bottom:5px;letter-spacing:-0.01em;}
  .cc-loc{font-size:11.5px;color:var(--text-light);display:flex;align-items:center;gap:4px;}
  .cc-loc svg{width:11px;height:11px;fill:var(--text-light);}
  .car-nav{display:flex;justify-content:center;gap:10px;margin-top:28px;}
  .car-btn{width:38px;height:38px;border-radius:50%;border:1.5px solid var(--gold);background:transparent;color:var(--gold);font-size:20px;line-height:1;display:flex;align-items:center;justify-content:center;transition:all 0.2s;}
  .car-btn:hover{background:var(--gold);color:white;}

  .cal-s{background:var(--off-white);padding:100px 0;}
  .cal-wrap{max-width:860px;margin:0 auto;}
  .cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;}
  .cal-lbl{font-size:20px;font-weight:800;color:var(--green);letter-spacing:-0.02em;text-transform:uppercase;}
  .cal-arr{width:34px;height:34px;border-radius:50%;border:1.5px solid var(--border);background:white;display:flex;align-items:center;justify-content:center;font-size:18px;color:var(--text-mid);transition:all 0.2s;line-height:1;cursor:pointer;}
  .cal-arr:hover{border-color:var(--gold);color:var(--gold);}
  .events-stack{display:flex;flex-direction:column;gap:12px;}
  .event-row{display:flex;align-items:center;gap:16px;padding:16px 20px;background:white;border:1.5px solid var(--border);border-radius:var(--radius);transition:all 0.22s;cursor:default;}
  .event-row:hover{border-color:var(--gold);background:var(--gold-pale);transform:translateX(3px);}
  .event-datebox{display:flex;flex-direction:column;align-items:center;min-width:54px;background:linear-gradient(160deg,var(--green) 0%,var(--green-accent) 100%);border-radius:5px;padding:9px 7px;flex-shrink:0;}
  .eday{font-size:24px;font-weight:900;color:var(--gold-light);line-height:1;letter-spacing:-0.02em;}
  .emo{font-size:8.5px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:rgba(255,255,255,0.6);}
  .event-info{flex:1;}
  .event-title{font-size:14.5px;font-weight:700;color:var(--green);margin-bottom:4px;letter-spacing:-0.01em;}
  .event-meta{display:flex;gap:14px;flex-wrap:wrap;font-size:11.5px;color:var(--text-light);}
  .ev-chip{font-size:9px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;padding:4px 9px;border-radius:2px;white-space:nowrap;}
  .ev-twilight{background:rgba(14,43,26,0.09);color:var(--green);}
  .ev-18hole{background:rgba(201,168,76,0.16);color:var(--gold-dim);}
  .ev-tournament{background:var(--green);color:white;}
  .ev-simulator{background:rgba(0,0,0,0.06);color:var(--text-mid);}
  .cal-empty{text-align:center;padding:40px 20px;font-size:13px;color:var(--text-light);font-weight:300;line-height:1.8;}
  .cal-empty a{color:var(--gold-dim);font-weight:600;}
  .cal-dow-row{display:grid;grid-template-columns:repeat(7,1fr);margin-bottom:1px;}

  .about-s{background:var(--cream);padding:100px 0;}

/* HOOK */
function useReveal(){
  const r=useRef(null);
  useEffect(()=>{
    const el=r.current;if(!el)return;
    const obs=new IntersectionObserver(([e])=>{if(e.isIntersecting){el.classList.add("in");obs.unobserve(el);}},{threshold:0.07});
    obs.observe(el);
    return()=>obs.disconnect();
  },[]);
  return r;
}

function Nav({scrolled}){
  const[open,setOpen]=useState(false);
  const links=[["#pricing","Membership"],["#courses","Courses"],["#calendar","Calendar"],["#sponsors","Sponsors"],["#blog","Blog"],["#contact","Contact"]];
  const close=()=>setOpen(false);
  return(
    <>
      <nav className={"nav"+(scrolled?" scrolled":"")}>
        <a href="#home" className="nav-logo" onClick={close}>
          <NavLogo/>
          <div className="nav-logo-text">
            <span className="nav-logo-primary">Pittsburgh Golf Network</span>
            
          </div>
        </a>
        <ul className="nav-links">{links.map(([h,l])=><li key={h}><a href={h}>{l}</a></li>)}</ul>
        <div className="nav-actions">
          <a href="https://members.pittsburghgolfnetwork.com" className="btn-ghost" target="_blank" rel="noreferrer">Member Login</a>
          <a href="https://signup.pittsburghgolfnetwork.com" className="btn-gold" target="_blank" rel="noreferrer">Apply Now</a>
        </div>
        <button className={"nav-hamburger"+(open?" open":"")} onClick={()=>setOpen(o=>!o)} aria-label="Menu">
          <span/><span/><span/>
        </button>
      </nav>
      <div className={"mobile-menu"+(open?" open":"")}>
        {links.map(([h,l])=><a key={h} href={h} onClick={close}>{l}</a>)}
        <div className="mobile-menu-ctas">
          <a href="https://members.pittsburghgolfnetwork.com" className="btn-ghost" target="_blank" rel="noreferrer" onClick={close}>Member Login</a>
          <a href="https://signup.pittsburghgolfnetwork.com" className="btn-gold" target="_blank" rel="noreferrer" onClick={close}>Apply Now</a>
        </div>
      </div>
    </>
  );
}

function ValueSection(){
  const rH=useReveal();
  const cards=[
    {icon:"i-target",title:"Custom-Curated Foursomes",body:"We survey every member and intentionally match you with the right connections. No random pairings — every round is designed to create real business opportunities."},
    {icon:"i-handshake",title:"Deep Connections on the Course",body:"Multiple hours together on the course, followed by dinner and drinks, creates the kind of relationships that lead to partnerships and deals no conference ever could."},
    {icon:"i-chart",title:"One Deal Pays for Itself",body:"One lead, one sale, one strategic partnership and the membership pays for itself. PGN members are Pittsburgh's most connected professionals."},
  ];
  return(
    <section className="value-s" id="value">
      <div className="sw">
        <div className="sh reveal" ref={rH}><div className="eyebrow">Why PGN</div><h2 className="st">Networking the Way It Should Be</h2><p className="ss">Forget corporate speed-dating and awkward happy hours. PGN is built on shared fairways, genuine conversation, and the kind of relationships that actually move your business forward.</p></div>

          {cards.map((c,i)=>{const r=useReveal();return(
            <div className="vc reveal" key={c.title} ref={r}>

            </div>

        </div>
      </div>
    </section>
  );
}

function CoursesSection(){

function CalendarSection(){
  const[year,setYear]=useState(2026);
  const[mo,setMo]=useState(3);
  const rH=useReveal(),rC=useReveal();
  const change=d=>{let m=mo+d,y=year;if(m>11){m=0;y++;}if(m<0){m=11;y--;}setMo(m);setYear(y);};
  const key=`${year}-${String(mo+1).padStart(2,"0")}`;
  const monthEvs=EVENTS[key]||[];
  const sorted=[...monthEvs].sort((a,b)=>a.day-b.day);
  const dCls={twilight:"d-tw","18hole":"d-18",tournament:"d-to",simulator:"d-si"};
  const dLbl={twilight:"Twilight 9","18hole":"18 Holes",tournament:"Tournament",simulator:"Simulator"};
  return(
    <section className="cal-s" id="calendar">
      <div className="sw">
        <div className="sh reveal" ref={rH}><div className="eyebrow">Events Calendar</div><h2 className="st">Upcoming Events</h2><p className="ss">Monthly twilight rounds, quarterly 18-hole events, and more — stay current with everything PGN has on the schedule.</p></div>
        <div className="cal-wrap reveal" ref={rC}>
          <div className="cal-nav">
            <button className="cal-arr" onClick={()=>change(-1)}>&#8249;</button>
            <div className="cal-lbl">{MONTHS[mo]} {year}</div>
            <button className="cal-arr" onClick={()=>change(1)}>&#8250;</button>
          </div>
          {sorted.length===0?(
            <div className="cal-empty">No events scheduled this month. <a href="#contact">Contact us</a> for updates.</div>
          ):(
            <div className="events-stack">
              {sorted.map((ev,i)=>(
                <div className="event-row" key={i}>
                  <div className="event-datebox">
                    <span className="eday">{ev.day}</span>
                    <span className="emo">{MONTHS[mo].slice(0,3)}</span>
                  </div>
                  <div className="event-info">
                    <div className="event-title">{ev.title}</div>
                    <div className="event-meta">
                      <span><svg viewBox="0 0 24 24" style={{width:"10px",height:"10px",fill:"#888",marginRight:"3px"}}><use href="#i-cal"/></svg>{ev.time}</span>
                      <span><svg viewBox="0 0 24 24" style={{width:"10px",height:"10px",fill:"#888",marginRight:"3px"}}><use href="#i-pin"/></svg>{ev.course}</span>
                    </div>
                  </div>
                  <span className={"ev-chip "+dCls[ev.type]}>{dLbl[ev.type]}</span>
                </div>
              ))}
            </div>
          )}
        </div>
      </div>
    </section>
  );
}

function App(){
  const[scrolled,setScrolled]=useState(false);

  useEffect(()=>{
    const tag=document.createElement("style");
    tag.textContent=CSS;
    document.head.appendChild(tag);
    return()=>document.head.removeChild(tag);
  },[]);

  useEffect(()=>{
    const h=()=>setScrolled(window.scrollY>20);
    window.addEventListener("scroll",h,{passive:true});
    return()=>window.removeEventListener("scroll",h);
  },[]);

  useEffect(()=>{
    const h=e=>{
      const a=e.target.closest("a[href^='#']");
      if(!a)return;
      const t=document.querySelector(a.getAttribute("href"));
      if(t){e.preventDefault();t.scrollIntoView({behavior:"smooth"});}
    };
    document.addEventListener("click",h);
    return()=>document.removeEventListener("click",h);
  },[]);

  const hash = window.location.hash;
  if(hash==='#privacy') return <><LegalPage type="privacy"/></>;
  if(hash==='#terms') return <><LegalPage type="terms"/></>;

  return(
    <>
      <IconDefs/>
      <Nav scrolled={scrolled}/>
      <Hero/>
      <ValueSection/>
      <PricingSection/>
      <ROISection/>
      <CoursesSection/>
      <CalendarSection/>
      <AboutSection/>
      <SponsorsSection/>
      <PartnersSection/>
      <BlogSection/>
      <ContactSection/>
      <Footer/>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
setTimeout(()=>{const r=document.getElementById('root');if(r)r.style.opacity='1';},100);
  </script>
